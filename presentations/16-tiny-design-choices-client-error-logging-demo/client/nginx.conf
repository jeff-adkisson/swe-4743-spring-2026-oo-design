server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unknown route returns index.html so Angular's router takes over
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Standard static asset caching
    location ~* \.(?:js|css|ico|svg|png|jpg|jpeg|gif|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
